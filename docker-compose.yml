version: '3.8'

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: [ "CMD-SHELL", "echo 'srvr' | nc -w 2 localhost 2181 | grep -q 'Mode'" ]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 10s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: [ "CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka:29092" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Para activar Oracle: descomentar este bloque y leer el README
  # oracle:
  #   image: gvenzl/oracle-xe:21-slim
  #   container_name: oracle
  #   ports:
  #     - "1521:1521"
  #   environment:
  #     ORACLE_PASSWORD: admin_password
  #     APP_USER: app_user
  #     APP_USER_PASSWORD: app_password
  #   healthcheck:
  #     test: ["CMD-SHELL", "healthcheck.sh"]
  #     interval: 30s
  #     timeout: 20s
  #     retries: 20
  #     start_period: 90s

  app:
    build: .
    container_name: hotel-search-service
    depends_on:
      kafka:
        condition: service_healthy
      # oracle:                       # descomentar si se activa Oracle
      #   condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # ── Elegir base de datos ──────────────────────────────────────────────
      # h2     → H2 en memoria (por defecto, arranque inmediato)
      # oracle → Oracle XE (descomentar servicio oracle arriba, ~90s arranque)
      SPRING_PROFILES_ACTIVE: h2
