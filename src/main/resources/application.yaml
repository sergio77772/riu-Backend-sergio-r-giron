spring:
  application:
    name: hotel-search-service

  datasource:
    url: jdbc:h2:mem:hotelsearch
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true